<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <section class="hero">
    <nav class="navbar">
        <div >
            <img src="nett.png" class="logo">
        </div>
        <div class="header">
            <button class="language">English</button>
            <a href="net.html" class="button">Sign Up</a>
        </div>
    </nav>
    <div class="title">
        
        <h1>Enter your info to sign in</h1>
        <p class="para">Or get started with a new account.</p><br>
        
        <input type="email" placeholder="Email or mobile number" class="email">
        <button class="start"><a href="browser.html" style="text-decoration: none; color: white;">Continue</a></button>
        
    </div>
    <div class="help">
        <div class="question"><span>Get Help ></span></div>
        <div class="answer">
            <span>Forget email or mobile number?</span>
            <span>Learn more about sign-in</span>
        </div>  
    </div>
    </section>
    <script src="net.js"></script>
</body>
</html>
